<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4BC7E"/>
      <stop offset="50%" style="stop-color:#C9A962"/>
      <stop offset="100%" style="stop-color:#B8954F"/>
    </linearGradient>
  </defs>
  
  <!-- Símbolo -->
  <g transform="translate(200, 200)">
    <circle cx="0" cy="0" r="85" fill="none" stroke="#FAFAFA" stroke-width="2"/>
    
    <line x1="-35" y1="-40" x2="35" y2="-40" stroke="#FAFAFA" stroke-width="3" stroke-linecap="round"/>
    <line x1="-35" y1="0" x2="25" y2="0" stroke="#FAFAFA" stroke-width="3" stroke-linecap="round"/>
    <line x1="-35" y1="40" x2="35" y2="40" stroke="#FAFAFA" stroke-width="3" stroke-linecap="round"/>
    <line x1="-35" y1="-40" x2="-35" y2="40" stroke="#FAFAFA" stroke-width="3" stroke-linecap="round"/>
    
    <circle cx="45" cy="0" r="6" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Wordmark -->
  <text x="200" y="340" 
        font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial, sans-serif" 
        font-size="28" 
        font-weight="300" 
        letter-spacing="12"
        text-anchor="middle" 
        fill="#FAFAFA">ESSENZA</text>
</svg>
