<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4BC7E"/>
      <stop offset="50%" style="stop-color:#C9A962"/>
      <stop offset="100%" style="stop-color:#B8954F"/>
    </linearGradient>
  </defs>
  
  <g transform="translate(100, 100)">
    <!-- Círculo exterior -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#0A0A0A" stroke-width="2"/>
    
    <!-- E estilizada -->
    <line x1="-30" y1="-35" x2="30" y2="-35" stroke="#0A0A0A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-30" y1="0" x2="20" y2="0" stroke="#0A0A0A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-30" y1="35" x2="30" y2="35" stroke="#0A0A0A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-30" y1="-35" x2="-30" y2="35" stroke="#0A0A0A" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Punto dorado -->
    <circle cx="40" cy="0" r="5" fill="url(#goldGradient)"/>
  </g>
</svg>
